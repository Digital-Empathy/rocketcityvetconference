<header class="site-header">
  <div class="horizon-stripe horizon-stripe--thin" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="container site-header__inner">
    <a href="index.html" class="site-header__logo" aria-label="Rocket City Vet Conference home">
      <img src="assets/img/logo/rcvc logo.png" alt="Rocket City Vet Conference">
    </a>

    <button class="site-nav-toggle" aria-label="Toggle navigation" aria-controls="primary-nav">
      <span></span>
    </button>

    <nav class="site-nav" id="primary-nav" aria-label="Primary">
      <a href="index.html" data-nav="index.html">Home</a>
      <a href="conference.html" data-nav="conference.html">RCVC {{year}}</a>
      <a href="sponsors.html" data-nav="sponsors.html">Sponsors</a>
      <a href="faqs.html" data-nav="faqs.html">FAQ</a>
      <a href="{{registerUrl}}" class="btn btn--primary btn--sm site-nav__cta" data-register>{{registerLabel}}</a>
    </nav>
  </div>
</header>

<script>
  (function () {
    var toggle = document.querySelector('.site-nav-toggle');
    var nav = document.getElementById('primary-nav');
    if (toggle && nav) {
      toggle.addEventListener('click', function () {
        nav.classList.toggle('is-open');
      });
    }
  })();
</script>
